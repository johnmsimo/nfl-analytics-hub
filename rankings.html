<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rankings · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"><script src="/static/app.js" defer></script></head><body><main class="wrap"><section class="ai-page"><header class="ai-pagehead"><div><h1>Rankings</h1><p>Team power rankings and position leaderboards derived from season production.</p></div><div class="ai-controls" id="controls"></div></header><section class="ai-card ai-cardpad rankings-team"><h3>Team power rankings</h3><div id="team-ranks" class="ranking-strip"></div></section><div id="leaderboards" class="leaderboard-grid"></div></section></main><script>
document.addEventListener('DOMContentLoaded',async()=>{const{$,esc,fetchJSON,shell,weekControls,headshot,teamLogo}=NFLHub;shell('rankings');await weekControls($('#controls'),load);async function load(w){try{const d=await fetchJSON(`/api/rankings?season=${w.season}`);$('#team-ranks').innerHTML=d.teams.slice(0,12).map(t=>`<div class="rank-tile"><span>#${t.rank}</span><b>${t.team}</b><strong>${t.power_score}</strong><small>${t.record} · ${t.point_diff>0?'+':''}${t.point_diff}</small></div>`).join('');$('#leaderboards').innerHTML=Object.entries(d.leaders).map(([pos,rows])=>`<section class="ai-card ai-cardpad"><h3>${pos} leaderboard</h3>${rows.map(r=>`<a class="leader-row" href="/player/${r.playerId}"><span class="leader-num">${r.rank}</span><span><b>${esc(r.player)}</b><small>${r.team} · ${r.games} games</small></span><span><strong>${r.primary}</strong><small>${r.metric}</small></span><em>${r.score}</em></a>`).join('')||'<div class="ai-empty">No data</div>'}</section>`).join('')}catch(e){$('#leaderboards').innerHTML=`<div class="ai-card ai-empty">${esc(e.message)}</div>`}}});
</script></body></html>
