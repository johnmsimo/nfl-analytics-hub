<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tracker · NFL Analytics Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/static/theme.css">
<script src="/static/app.js" defer></script>
<style>
.livecard{border-color:rgba(255,82,82,.4)}
.liverow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(22,35,60,.6);font-size:13px;flex-wrap:wrap}
.liverow:last-child{border-bottom:0}
.liverow .cur{font-family:var(--disp);font-weight:700;margin-left:auto}
.pace{font-size:10px;font-weight:800;letter-spacing:.6px;border-radius:6px;padding:2px 7px;text-transform:uppercase}
.pace.on{background:rgba(0,230,118,.14);color:var(--g)}
.pace.off{background:rgba(255,82,82,.14);color:var(--r)}
.del{color:var(--mu);cursor:pointer;font-weight:700;padding:2px 7px;border-radius:6px}
.del:hover{color:var(--r);background:rgba(255,82,82,.1)}
.set{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
.set label{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--mu)}
.set input{width:100px}
</style>
</head>
<body>
<main class="wrap">
  <div class="kpis" id="hero"></div>
  <div class="panel livecard" id="livepanel" style="display:none">
    <h2><span class="livedot"></span> Live picks</h2>
    <div class="pad" id="live"></div>
  </div>
  <div class="bar">
    <button class="btn" id="grade">Grade pending</button>
    <button class="btn" id="capture">Capture closing</button>
    <span class="muted" id="msg"></span>
  </div>
  <div class="panel"><h2>Picks</h2><div class="scroll" id="picks"><div class="skel skel-row"></div><div class="skel skel-row"></div></div></div>
  <div class="panel"><h2>Per-market record</h2><div class="scroll" id="markets"></div></div>
  <div class="panel"><h2>Bankroll settings</h2><div class="pad set" id="settings"></div></div>
</main>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const { $, esc, am, pc, fetchJSON, shell, poll } = NFLHub;
  shell('tracker');
  const MK = { pass_yds:'Pass Yds', pass_tds:'Pass TDs', rush_yds:'Rush Yds', receptions:'Rec', rec_yds:'Rec Yds', anytime_td:'ATD', h2h:'ML', spread:'Spread', total:'Total' };

  async function refresh() {
    let perf, picks;
    try {
      [perf, picks] = await Promise.all([fetchJSON('/api/tracker/performance'), fetchJSON('/api/tracker/picks')]);
    } catch (e) { $('#picks').innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
    renderHero(perf); renderPicks(picks); renderMarkets(perf); renderSettings(perf.settings);
  }
  window.trackerRefresh = refresh;

  function renderHero(p) {
    const k = p.primaryKpi || {};
    const kpi = (label, val, sub, cls = '', primary = false) =>
      `<div class="kpi ${primary ? 'primary' : ''}"><div class="l">${label}</div><div class="v ${cls}">${val}</div><div class="sub">${sub}</div></div>`;
    $('#hero').innerHTML =
      kpi('Beat Close %', k.value != null ? pc(k.value, 0) : '—', `n=${k.n} with CLV`, k.value > 0.5 ? 'pos' : '', true) +
      kpi('Avg CLV', k.avg_clv != null ? pc(k.avg_clv) : '—', 'closing − opening implied', k.avg_clv > 0 ? 'pos' : k.avg_clv < 0 ? 'neg' : '', true) +
      kpi('Record', `${p.wins}-${p.losses}${p.pushes ? '-' + p.pushes : ''}`, `${p.pending} pending`) +
      kpi('Hit rate', p.hit_rate != null ? pc(p.hit_rate, 0) : '—', `${p.wins + p.losses} decided`) +
      kpi('Profit', '$' + (p.profitDollars ?? 0).toFixed(2), `ROI ${p.roi != null ? pc(p.roi) : '—'}`, p.profitDollars > 0 ? 'pos' : p.profitDollars < 0 ? 'neg' : '');
  }

  function renderPicks(store) {
    const days = Object.keys(store).sort().reverse();
    let rows = '', any = false;
    for (const d of days) {
      for (const e of (store[d].entries || []).slice().reverse()) {
        any = true;
        rows += `<tr>
          <td class="muted">${d.slice(5)}</td>
          <td>${e.playerId ? `<a href="/player/${esc(e.playerId)}" style="font-weight:700">${esc(e.player)}</a>` : `<b>${esc(e.player)}</b>`}<span class="muted"> ${esc(e.team || '')}</span></td>
          <td>${esc(MK[e.marketKey] || e.marketKey)}</td>
          <td><span class="tag ${e.side === 'over' || e.side === 'home' ? 'over' : 'under'}">${e.marketKey === 'anytime_td' ? (e.side === 'over' ? 'YES' : 'NO') : (e.side || '') + (e.line != null && e.marketKey !== 'h2h' ? ' ' + e.line : '')}</span></td>
          <td class="num">${am(e.price)}</td>
          <td class="num hide-sm">${e.stakeDollars ? '$' + e.stakeDollars : '—'}</td>
          <td class="num hide-sm">${e.modelProb != null ? pc(e.modelProb, 0) : '—'}</td>
          <td class="num ${e.clvEdge > 0 ? 'pos' : e.clvEdge < 0 ? 'neg' : ''}">${e.clvEdge != null ? pc(e.clvEdge) : '—'}</td>
          <td class="num">${e.actual ?? '—'}</td>
          <td><span class="gr-pill ${e.grade}">${e.grade}</span></td>
          <td class="num ${e.profitDollars > 0 ? 'pos' : e.profitDollars < 0 ? 'neg' : ''}">${e.profitDollars != null ? '$' + e.profitDollars.toFixed(2) : '—'}</td>
          <td><span class="del" data-d="${d}" data-i="${esc(e.id)}">×</span></td>
        </tr>`;
      }
    }
    $('#picks').innerHTML = any
      ? `<table><thead><tr><th>Date</th><th>Pick</th><th>Mkt</th><th>Side</th><th class="num">Price</th><th class="num hide-sm">Stake</th><th class="num hide-sm">Model</th><th class="num">CLV</th><th class="num">Act</th><th>Grade</th><th class="num">P/L</th><th></th></tr></thead><tbody>${rows}</tbody></table>`
      : '<div class="empty">No picks yet — add from the <a href="/props" style="color:var(--volt)">Props board</a> via the slip.</div>';
    $('#picks').querySelectorAll('.del').forEach(x => x.onclick = async () => {
      if (!confirm('Delete pick?')) return;
      await fetch(`/api/tracker/pick/${x.dataset.d}/${x.dataset.i}`, { method: 'DELETE' });
      refresh();
    });
  }

  function renderMarkets(p) {
    const m = p.per_market || {};
    const keys = Object.keys(m);
    if (!keys.length) { $('#markets').innerHTML = '<div class="empty">—</div>'; return; }
    let h = '<table><thead><tr><th>Market</th><th class="num">N</th><th class="num">W</th><th class="num">L</th><th class="num">P</th><th class="num">P/L</th></tr></thead><tbody>';
    for (const k of keys) {
      const c = m[k];
      h += `<tr><td>${esc(MK[k] || k)}</td><td class="num">${c.n}</td><td class="num">${c.wins}</td><td class="num">${c.losses}</td><td class="num">${c.pushes}</td><td class="num ${c.profit > 0 ? 'pos' : c.profit < 0 ? 'neg' : ''}">$${c.profit.toFixed(2)}</td></tr>`;
    }
    $('#markets').innerHTML = h + '</tbody></table>';
  }

  function renderSettings(s) {
    $('#settings').innerHTML = `
      <label>Bankroll $<input id="s_bankroll" type="number" value="${s.bankroll}"></label>
      <label>Kelly fraction<input id="s_kelly" type="number" step="0.05" value="${s.kelly_fraction}"></label>
      <label>Max bet %<input id="s_max" type="number" step="0.01" value="${s.max_bet_pct}"></label>
      <label>Unit %<input id="s_unit" type="number" step="0.005" value="${s.unit_pct}"></label>
      <button class="btn primary" id="s_save">Save</button>`;
    $('#s_save').onclick = async () => {
      await fetch('/api/tracker/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bankroll: $('#s_bankroll').value, kelly_fraction: $('#s_kelly').value, max_bet_pct: $('#s_max').value, unit_pct: $('#s_unit').value }) });
      NFLHub.toast('Settings saved'); refresh();
    };
  }

  /* live pace — poll only while games are in progress */
  async function liveTick() {
    let d;
    try { d = await fetchJSON('/api/tracker/live'); } catch { return; }
    const rows = d.picks || [];
    if (!rows.length) { $('#livepanel').style.display = 'none'; return; }
    $('#livepanel').style.display = '';
    $('#live').innerHTML = rows.map(r => `
      <div class="liverow">
        <span class="pace ${r.hit ? 'on' : 'off'}">${r.hit ? 'hitting' : 'not yet'}</span>
        <b>${esc(r.player)}</b>
        <span class="muted">${esc(MK[r.marketKey] || r.marketKey)} ${r.side} ${r.line}</span>
        <span class="muted">${esc(r.state === 'in' ? r.detail || 'live' : 'final')} · ${esc(r.score)}</span>
        <span class="cur">${r.current ?? '—'} <span class="muted">/ ${r.line}</span></span>
      </div>`).join('');
    return d.live;
  }
  const first = await liveTick();
  if (first) poll(liveTick, 60000);

  $('#grade').onclick = async () => {
    const r = await fetchJSON('/api/tracker/grade', { method: 'POST' });
    $('#msg').textContent = `Graded ${r.graded} picks`; refresh();
  };
  $('#capture').onclick = async () => {
    const r = await fetchJSON('/api/tracker/closing-capture', { method: 'POST' });
    $('#msg').textContent = r.reason || `Captured ${r.captured} closing lines`; refresh();
  };

  refresh();
});
</script>
</body>
</html>
