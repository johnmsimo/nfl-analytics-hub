<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Live Intelligence | NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"></head><body data-page="live"><div id="app-shell"></div><main class="ai-main"><section class="page-hero"><div><p class="eyebrow">VERSION 2.0</p><h1>Live Intelligence Center</h1><p>Warehouse-backed game state, latest play, EPA and win-probability signals.</p></div><div class="hero-actions"><input id="season" class="control" value="2025" inputmode="numeric"><input id="week" class="control" placeholder="Week"></div></section><section id="live-grid" class="card-grid"><article class="panel"><p>Loading live intelligence…</p></article></section><section class="panel"><div class="panel-head"><h2>Data freshness</h2><span id="health-summary" class="badge">Checking</span></div><div id="source-grid" class="table-wrap"></div></section></main><script src="/static/app.js"></script><script>
async function load(){const s=document.querySelector('#season').value||2025,w=document.querySelector('#week').value;const q=`season=${encodeURIComponent(s)}${w?`&week=${encodeURIComponent(w)}`:''}`;const [live,health]=await Promise.all([App.api(`/api/v2/live?${q}`),App.api('/api/v2/platform/health')]);document.querySelector('#live-grid').innerHTML=live.games.length?live.games.map(g=>`<article class="panel"><div class="panel-head"><span class="badge">Week ${g.week}</span><span>${g.state||'scheduled'}</span></div><h2>${g.away.team} ${g.away.score??'-'} <span class="muted">at</span> ${g.home.team} ${g.home.score??'-'}</h2><p>${g.last_play?.description||'No play-by-play record yet.'}</p><div class="kpi-row"><span>Q${g.last_play?.quarter??'-'}</span><span>EPA ${g.last_play?.epa?.toFixed?.(2)??'-'}</span><span>WPA ${g.last_play?.wpa?.toFixed?.(3)??'-'}</span></div><a class="text-link" href="/game/${g.id}">Open matchup →</a></article>`).join(''):'<article class="panel"><p>No games found for this filter.</p></article>';document.querySelector('#health-summary').textContent=`${health.summary.fresh} fresh · ${health.summary.stale} stale`;document.querySelector('#source-grid').innerHTML=`<table><thead><tr><th>Source</th><th>Status</th><th>Age</th><th>Expected</th></tr></thead><tbody>${health.sources.map(x=>`<tr><td>${x.name}</td><td><span class="badge">${x.status}</span></td><td>${x.age_minutes??'Never'}${x.age_minutes!=null?' min':''}</td><td>${x.expected_minutes} min</td></tr>`).join('')}</tbody></table>`}
document.querySelector('#season').addEventListener('change',load);document.querySelector('#week').addEventListener('change',load);App.mountShell('live');load().catch(e=>document.querySelector('#live-grid').innerHTML=`<article class="panel"><p>${e.message}</p></article>`);
</script></body></html>
