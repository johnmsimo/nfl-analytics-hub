<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"></head><body class="login-page"><main class="login-wrap"><section class="login-card"><div class="ai-brand login-brand"><span class="ai-mark">N</span><span>NFL ANALYTICS<small>AI Intelligence Hub</small></span></div><h1>Welcome back</h1><p>Sign in to access analytics, projections, and your private tracker.</p><form id="login-form"><label>Username<input id="username" autocomplete="username" required autofocus></label><label>Password<input id="password" type="password" autocomplete="current-password" required></label><button class="btn primary" type="submit">Sign in</button><p id="login-error" class="login-error" role="alert"></p></form></section></main><script>
const next=new URLSearchParams(location.search).get('next')||'/';document.getElementById('login-form').onsubmit=async e=>{e.preventDefault();const b=e.currentTarget.querySelector('button'),err=document.getElementById('login-error');b.disabled=true;b.textContent='Signing in…';err.textContent='';try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value,next})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Sign-in failed');location.href=d.next||'/'}catch(x){err.textContent=x.message;b.disabled=false;b.textContent='Sign in'}};
</script></body></html>
