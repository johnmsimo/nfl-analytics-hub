<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projections · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"><script src="/static/app.js" defer></script></head><body><main class="wrap"><section class="ai-page"><header class="ai-pagehead"><div><h1>Projections</h1><p>Transparent analytic projections using player history, recent form, and opponent context.</p></div><div class="ai-controls" id="controls"></div></header><div class="directory-toolbar"><input id="q" placeholder="Search player or team"><select id="market"><option value="ALL">All markets</option></select><select id="position"><option value="ALL">All positions</option><option>QB</option><option>RB</option><option>WR</option><option>TE</option></select></div><article class="ai-card"><div class="directory-table-wrap"><table class="ai-data directory-table"><thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Opponent</th><th>Market</th><th>Projection</th><th>Reference line</th><th>P(Over)</th><th>Sample</th></tr></thead><tbody id="rows"><tr><td colspan="9" class="ai-empty">Loading projections…</td></tr></tbody></table></div></article><p class="directory-count" id="count"></p></section></main><script>
document.addEventListener('DOMContentLoaded',async()=>{const{$,esc,pc,fetchJSON,shell,weekControls}=NFLHub;shell('projections');let current;await weekControls($('#controls'),w=>{current=w;load()});let timer;for(const id of ['q','market','position']){$('#'+id).addEventListener(id==='q'?'input':'change',()=>{clearTimeout(timer);timer=setTimeout(load,180)})}async function load(){if(!current)return;const u=new URLSearchParams({season:current.season,q:$('#q').value,market:$('#market').value,position:$('#position').value,limit:400});try{const d=await fetchJSON('/api/projections?'+u);if($('#market').options.length===1)$('#market').innerHTML='<option value="ALL">All markets</option>'+d.markets.map(m=>`<option value="${m.key}">${m.label}</option>`).join('');$('#rows').innerHTML=d.projections.length?d.projections.map(p=>`<tr><td><a href="/player/${p.playerId}"><b>${esc(p.player)}</b></a></td><td>${p.position}</td><td><span class="team-pill">${p.team}</span></td><td>${p.opponent||'—'}</td><td>${esc(p.marketLabel)}</td><td><b>${p.projection}</b></td><td>${p.line}</td><td class="${p.probOver>=.5?'positive':'negative'}">${pc(p.probOver)}</td><td>${p.games||'—'} G</td></tr>`).join(''):'<tr><td colspan="9" class="ai-empty">No matching projections.</td></tr>';$('#count').textContent=`${d.total} projections · stats season ${d.stats_season}`}catch(e){$('#rows').innerHTML=`<tr><td colspan="9" class="ai-empty">${esc(e.message)}</td></tr>`}}});
</script></body></html>
