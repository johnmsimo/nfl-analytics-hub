[tool.ruff]
target-version = "py311"
line-length = 110
exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers --cov=. --cov-report=term-missing --cov-fail-under=75"

[tool.coverage.run]
branch = true
omit = ["tests/*", "migrations/*", ".venv/*"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
exclude = "migrations/"
