<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NFL Analytics Hub</title>
<style>
:root{--bg:#0b1120;--panel:#131c31;--panel2:#182444;--line:#24304f;--txt:#e6ecf7;--dim:#8fa1bf;--acc:#4f8ff7;--green:#2fbf71;--red:#e5484d;--gold:#e8b339}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.nav{display:flex;align-items:center;gap:18px;padding:14px 22px;background:var(--panel);border-bottom:1px solid #243049;position:sticky;top:0;z-index:5}
.nav .logo{font-weight:800;font-size:16px;letter-spacing:.4px}
.nav .logo span{color:var(--acc)}
.nav a.tab{color:var(--dim);font-weight:600;padding:6px 10px;border-radius:8px}
.nav a.tab.on,.nav a.tab:hover{color:var(--txt);background:#1c2740}
.wrap{max-width:1200px;margin:0 auto;padding:20px 22px}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
select,button,input{background:#1a2440;color:var(--txt);border:1px solid #2a3a5e;border-radius:8px;padding:7px 10px;font:inherit}
button{cursor:pointer}button:hover{border-color:var(--acc)}
.muted{color:var(--dim);font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid #22304e;border-radius:12px;padding:14px 16px;display:block;transition:border-color .15s}
.card:hover{border-color:var(--acc)}
.card .top{display:flex;justify-content:space-between;color:var(--dim);font-size:12px;margin-bottom:10px}
.teams{display:flex;flex-direction:column;gap:8px}
.trow{display:flex;justify-content:space-between;align-items:center}
.tname{font-weight:700}.trec{color:var(--dim);font-size:12px;margin-left:8px}
.score{font-weight:800;font-size:18px}
.final .score.win{color:var(--green)}
.lines{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.pill{background:#1a2440;border:1px solid #2a3a5e;border-radius:7px;padding:3px 9px;font-size:12px;color:var(--dim)}
.pill b{color:var(--txt)}
.state{font-weight:700}
.state.live{color:var(--red)}.state.final{color:var(--dim)}.state.pre{color:var(--acc)}
.empty{color:var(--dim);padding:60px;text-align:center}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo">NFL <span>Analytics Hub</span></div>
  <a class="tab on" href="/">Dashboard</a>
  <a class="tab" href="/props">Props</a>
  <a class="tab" href="/tracker">Tracker</a>
</nav>
<div class="wrap">
  <div class="bar">
    <select id="season"></select>
    <select id="stype"><option value="REG">Regular</option><option value="POST">Playoffs</option></select>
    <select id="week"></select>
    <button id="go">Load</button>
    <span class="muted" id="meta"></span>
  </div>
  <div class="grid" id="grid"><div class="empty">Loading…</div></div>
</div>
<script>
const $=q=>document.querySelector(q);
let cur=null;
function fillSel(el,vals,sel){el.innerHTML=vals.map(v=>`<option ${v==sel?'selected':''}>${v}</option>`).join('')}
async function init(){
  cur=await (await fetch('/api/games/current')).json();
  const y=cur.season;
  fillSel($('#season'),[y-1,y,y+1].filter(v=>v>=2022),y);
  $('#stype').value=cur.season_type||'REG';
  fillWeeks(cur.week);
  load();
}
function fillWeeks(sel){
  const post=$('#stype').value==='POST';
  fillSel($('#week'),post?[1,2,3,4,5]:Array.from({length:18},(_,i)=>i+1),sel||1);
}
$('#stype').onchange=()=>fillWeeks(1);
$('#go').onclick=load;
async function load(){
  $('#grid').innerHTML='<div class="empty">Loading…</div>';
  const s=$('#season').value,w=$('#week').value,t=$('#stype').value;
  const d=await (await fetch(`/api/games/week?season=${s}&week=${w}&type=${t}`)).json();
  $('#meta').textContent=`${d.games.length} games · stats from ${cur.stats_season}${d.games.some(g=>g.lines.available)?'':' · odds offline'}`;
  if(!d.games.length){$('#grid').innerHTML='<div class="empty">No games.</div>';return}
  $('#grid').innerHTML=d.games.map(card).join('');
}
function esc(x){return String(x??'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function card(g){
  const done=g.completed,live=g.state==='in';
  const hw=done&&g.home_score>g.away_score,aw=done&&g.away_score>g.home_score;
  const dt=new Date(g.date).toLocaleString([],{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  const L=g.lines||{};
  let pills='';
  if(L.available){
    if(L.spreads&&L.spreads.point!=null)pills+=`<span class="pill">Spread <b>${g.home_team} ${L.spreads.point>0?'+':''}${L.spreads.point}</b></span>`;
    if(L.totals&&L.totals.point!=null)pills+=`<span class="pill">O/U <b>${L.totals.point}</b></span>`;
    const bh=L.h2h&&L.h2h.best_home;
    if(bh)pills+=`<span class="pill">${g.home_team} ML <b>${bh.price>0?'+':''}${bh.price}</b>${bh.ev>0?` <b style="color:var(--green)">+${(bh.ev*100).toFixed(1)}%</b>`:''}</span>`;
  }else{pills='<span class="pill">no odds</span>'}
  return `<a class="card ${done?'final':''}" href="/game/${g.game_id}?season=${g.season}">
    <div class="top"><span class="state ${live?'live':done?'final':'pre'}">${live?'LIVE':done?'FINAL':dt}</span><span>${esc(g.venue||'')}</span></div>
    <div class="teams">
      <div class="trow"><span><span class="tname">${esc(g.away_name)}</span><span class="trec">${esc(g.away_summary?.record||g.away_record||'')}</span></span><span class="score ${aw?'win':''}">${g.away_score??''}</span></div>
      <div class="trow"><span><span class="tname">${esc(g.home_name)}</span><span class="trec">${esc(g.home_summary?.record||g.home_record||'')}</span></span><span class="score ${hw?'win':''}">${g.home_score??''}</span></div>
    </div>
    <div class="lines">${pills}</div>
  </a>`;
}
init();
</script>
</body>
</html>
