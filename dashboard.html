<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Slate · NFL Analytics Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/static/theme.css">
<script src="/static/app.js" defer></script>
<style>
.gamegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:12px}
.gcard{display:block;padding:13px 15px}
.gcard:hover{border-color:var(--b-strong)}
.gcard .top{display:flex;justify-content:space-between;align-items:center;color:var(--mu);font-size:11px;margin-bottom:10px;gap:8px}
.gcard .venue{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.tname{font-weight:700}
.trec{color:var(--mu);font-size:11px;margin-left:7px}
.score{font-family:var(--disp);font-weight:700;font-size:19px;font-variant-numeric:tabular-nums;color:var(--mu)}
.score.win{color:var(--g)}
.gcard.pre .score{display:none}
.gcard .pills{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
</style>
</head>
<body>
<main class="wrap">
  <div class="bar" id="controls"></div>
  <div class="bar" style="margin-top:-6px"><span class="muted" id="meta"></span></div>
  <div class="gamegrid" id="grid"></div>
</main>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const { $, esc, am, fetchJSON, shell, weekControls, poll } = NFLHub;
  shell('slate');
  let stopPoll = null, lastQ = null;

  const skeleton = () => $('#grid').innerHTML =
    Array.from({length:6},()=>'<div class="skel skel-card"></div>').join('');

  await weekControls($('#controls'), load);

  async function load(w, quiet) {
    lastQ = w;
    if (!quiet) skeleton();
    let d;
    try {
      d = await fetchJSON(`/api/games/week?season=${w.season}&week=${w.week}&type=${w.type}`);
    } catch (e) {
      $('#grid').innerHTML = `<div class="empty">Couldn't load the slate (${esc(e.message)}).</div>`;
      return;
    }
    const live = d.games.some(g => g.state === 'in');
    const anyOdds = d.games.some(g => g.lines && g.lines.available);
    $('#meta').innerHTML = `${d.games.length} games` +
      (live ? ' · <span class="tag live"><span class="livedot"></span> LIVE</span>' : '') +
      (anyOdds ? '' : ' · <span class="muted">odds offline</span>');
    $('#grid').innerHTML = d.games.length
      ? d.games.map(card).join('')
      : '<div class="empty">No games this week.</div>';

    if (stopPoll) { stopPoll(); stopPoll = null; }
    if (live) stopPoll = poll(() => load(lastQ, true), 30000);
  }

  function card(g) {
    const done = g.completed, live = g.state === 'in';
    const hw = done && g.home_score > g.away_score, aw = done && g.away_score > g.home_score;
    const dt = new Date(g.date).toLocaleString([], { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    const state = live
      ? `<span class="tag live"><span class="livedot"></span> ${esc(g.status_detail || 'LIVE')}</span>`
      : done ? '<span class="tag final">Final</span>' : `<span class="tag pre">${dt}</span>`;
    const L = g.lines || {};
    let pills = '';
    if (L.available) {
      if (L.spreads && L.spreads.point != null)
        pills += `<span class="pill">${g.home_team} <b>${L.spreads.point > 0 ? '+' : ''}${L.spreads.point}</b></span>`;
      if (L.totals && L.totals.point != null)
        pills += `<span class="pill">O/U <b>${L.totals.point}</b></span>`;
      const bh = L.h2h && L.h2h.best_home;
      if (bh) pills += `<span class="pill">${g.home_team} ML <b>${am(bh.price)}</b>${bh.ev > 0 ? ` <b class="pos">+${(bh.ev * 100).toFixed(1)}%</b>` : ''}</span>`;
    } else if (!done) {
      pills = '<span class="pill">no lines yet</span>';
    }
    const team = (name, rec, score, win) => `
      <div class="trow">
        <span><span class="tname">${esc(name)}</span><span class="trec">${esc(rec || '')}</span></span>
        <span class="score ${win ? 'win' : ''}">${score ?? ''}</span>
      </div>`;
    return `<a class="card gcard ${done ? 'final' : ''} ${(!done && !live) ? 'pre' : ''}" href="/game/${g.game_id}?season=${g.season}">
      <div class="top">${state}<span class="venue">${esc(g.venue || '')}</span></div>
      ${team(g.away_name, g.away_summary?.record || g.away_record, g.away_score, aw)}
      ${team(g.home_name, g.home_summary?.record || g.home_record, g.home_score, hw)}
      <div class="pills">${pills}</div>
    </a>`;
  }
});
</script>
</body>
</html>
