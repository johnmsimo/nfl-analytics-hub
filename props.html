<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Props · NFL Analytics Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/static/theme.css">
<script src="/static/app.js" defer></script>
<style>
.addbtn{background:var(--volt-dim);border:1px solid var(--b-strong);color:var(--volt);border-radius:8px;font-weight:800;font-size:12px;padding:5px 11px;min-height:30px}
.addbtn:hover{background:rgba(184,236,61,.22)}
.addbtn.in{background:var(--card3);border-color:var(--line);color:var(--mu)}
.pname{font-weight:700}
.pname:hover{color:var(--volt)}
.psub{color:var(--mu);font-size:11px}
</style>
</head>
<body>
<main class="wrap">
  <div class="bar" id="controls"></div>
  <div class="bar">
    <select id="fmkt"><option value="">All markets</option></select>
    <select id="fpos"><option value="">All positions</option><option>QB</option><option>RB</option><option>WR</option><option>TE</option></select>
    <input type="search" id="fq" placeholder="Player or team…" style="flex:1;min-width:140px;max-width:230px">
    <span class="muted" id="meta"></span>
  </div>
  <div class="panel scroll" id="boardwrap"><table id="tbl"><tbody></tbody></table></div>
</main>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const { $, esc, am, fetchJSON, shell, weekControls, addToSlip, headshot, teamLogo } = NFLHub;
  shell('props');

  const LABELS = { pass_yds:'Pass Yards', pass_tds:'Pass TDs', rush_yds:'Rush Yards', receptions:'Receptions', rec_yds:'Rec Yards', anytime_td:'Anytime TD' };
  $('#fmkt').innerHTML = '<option value="">All markets</option>' +
    Object.entries(LABELS).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');

  let all = [], sortKey = 'edge', sortDir = -1, lastW = null;
  const skeleton = () => $('#tbl tbody').innerHTML =
    Array.from({length:8},()=>'<tr><td colspan="12" style="padding:4px 8px"><div class="skel" style="height:34px"></div></td></tr>').join('');

  await weekControls($('#controls'), load);
  ['fmkt','fpos'].forEach(id => $('#'+id).onchange = render);
  $('#fq').oninput = render;

  async function load(w) {
    lastW = w; skeleton();
    let d;
    try {
      d = await fetchJSON(`/api/props/board?season=${w.season}&week=${w.week}&type=${w.type}`);
    } catch (e) {
      $('#tbl tbody').innerHTML = `<tr><td class="empty">Couldn't load board (${esc(e.message)}).</td></tr>`;
      return;
    }
    all = d.rows || [];
    $('#meta').textContent = `${all.length} props · ${d.games} games` + (d.odds_configured ? '' : ' · odds offline (model lines*)');
    render();
  }

  function render() {
    const mk = $('#fmkt').value, pos = $('#fpos').value, q = $('#fq').value.toLowerCase();
    const rows = all.filter(r =>
      (!mk || r.marketKey === mk) && (!pos || r.position === pos) &&
      (!q || r.player.toLowerCase().includes(q) || r.team.toLowerCase().includes(q)));
    rows.sort((a,b) => { const x=a[sortKey], y=b[sortKey];
      if (x==null&&y==null) return 0; if (x==null) return 1; if (y==null) return -1;
      return x<y ? sortDir : x>y ? -sortDir : 0; });
    const H = (k,l,cls='') => `<th class="sortable ${cls}" data-k="${k}">${l}${sortKey===k?(sortDir<0?' ↓':' ↑'):''}</th>`;
    let h = '<thead><tr>' + H('player','Player') + H('marketKey','Market') + H('line','Line','num') +
      H('modelMean','Proj','num') + H('probOver','P(O)','num') + '<th>Pick</th>' +
      '<th class="num">Best</th>' + H('edge','Edge','num') + H('evPct','EV','num hide-sm') +
      H('kellyPct','Kelly','num hide-sm') + H('grade','Gr') + '<th></th></tr></thead><tbody>';
    for (const r of rows.slice(0, 400)) {
      const best = r.side === 'over' ? r.bestOver : r.bestUnder;
      const gcls = (r.grade || '').replace('+','p');
      h += `<tr>
        <td><div class="pcell">${headshot(r.playerId)}<div><a class="pname" href="/player/${esc(r.playerId)}?season=${r.season}">${esc(r.player)}</a>
            <div class="psub">${teamLogo(r.team)} ${r.team} ${r.position} vs ${r.opponent}</div></div></div></td>
        <td>${esc(r.marketLabel)}</td>
        <td class="num">${r.line}${r.noOdds ? '<span class="muted">*</span>' : ''}</td>
        <td class="num">${r.modelMean}</td>
        <td class="num">${(r.probOver*100).toFixed(0)}%</td>
        <td><span class="tag ${r.side==='over'?'over':'under'}">${r.marketKey==='anytime_td'?(r.side==='over'?'YES':'NO'):r.side}</span></td>
        <td class="num">${best ? `${am(best.price)} <span class="muted">${esc(best.book)}</span>` : '—'}</td>
        <td class="num ${r.edge>0?'pos':r.edge<0?'neg':''}">${r.edge!=null?(r.edge*100).toFixed(1)+'%':'—'}</td>
        <td class="num hide-sm ${r.evPct>0?'pos':r.evPct<0?'neg':''}">${r.evPct!=null?(r.evPct*100).toFixed(1)+'%':'—'}</td>
        <td class="num hide-sm">${r.kellyPct?(r.kellyPct*100).toFixed(1)+'%':'—'}</td>
        <td>${r.grade?`<span class="grade-b ${gcls}">${r.grade}</span>`:''}</td>
        <td><button class="addbtn" data-k="${esc(r.playerId)}|${esc(r.marketKey)}|${r.line}">+ Slip</button></td>
      </tr>`;
    }
    $('#tbl').innerHTML = h + '</tbody>' || '';
    if (!rows.length) $('#tbl').innerHTML = '<tbody><tr><td class="empty">No props match.</td></tr></tbody>';
    document.querySelectorAll('th.sortable').forEach(th => th.onclick = () => {
      const k = th.dataset.k;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
      render();
    });
    document.querySelectorAll('.addbtn').forEach(b => b.onclick = () => add(b));
  }

  function add(btn) {
    const [pid, mk, line] = btn.dataset.k.split('|');
    const r = all.find(x => String(x.playerId) === pid && x.marketKey === mk && String(x.line) === line);
    if (!r) return;
    const best = r.side === 'over' ? r.bestOver : r.bestUnder;
    addToSlip({
      gameId: r.gameId, season: r.season, week: r.week, gameday: r.gameday,
      player: r.player, playerId: r.playerId, team: r.team, opponent: r.opponent,
      position: r.position, marketKey: r.marketKey, marketLabel: r.marketLabel,
      line: r.line, side: r.side, price: best ? best.price : null,
      book: best ? best.book : null, modelProb: r.modelProb,
      impliedProb: r.impliedProb, fairProb: r.fairProb, edge: r.edge,
      evPct: r.evPct, kellyPct: r.kellyPct, modelSource: r.modelSource,
    });
    btn.textContent = '✓ In slip'; btn.classList.add('in');
  }
});
</script>
</body>
</html>
