<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game · NFL Analytics Hub</title>
<style>
:root{--bg:#0b1120;--panel:#131c31;--line:#24304f;--txt:#e6ecf7;--dim:#8fa1bf;--acc:#4f8ff7;--green:#2fbf71;--red:#e5484d}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,'Segoe UI',Roboto,sans-serif}
a{color:inherit;text-decoration:none}
.nav{display:flex;align-items:center;gap:18px;padding:14px 22px;background:var(--panel);border-bottom:1px solid #243049;position:sticky;top:0;z-index:5}
.nav .logo{font-weight:800;font-size:16px}.nav .logo span{color:var(--acc)}
.nav a.tab{color:var(--dim);font-weight:600;padding:6px 10px;border-radius:8px}
.nav a.tab:hover{color:var(--txt);background:#1c2740}
.wrap{max-width:1200px;margin:0 auto;padding:20px 22px}
.head{background:var(--panel);border:1px solid #22304e;border-radius:12px;padding:18px 20px;margin-bottom:16px}
.head h1{font-size:20px;margin-bottom:4px}
.muted{color:var(--dim);font-size:12px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.cols{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid #22304e;border-radius:12px;padding:14px 16px;margin-bottom:14px}
.panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--dim);text-align:left;font-weight:600;padding:5px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid #1b2540;white-space:nowrap}
tr:last-child td{border-bottom:0}
.num{text-align:right}
.pos{color:var(--green)}.neg{color:var(--red)}
.scroll{overflow-x:auto}
.grade{font-weight:700;padding:1px 7px;border-radius:6px;background:#1a2440}
.empty{color:var(--dim);padding:24px;text-align:center}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo">NFL <span>Analytics Hub</span></div>
  <a class="tab" href="/">Dashboard</a>
  <a class="tab" href="/props">Props</a>
  <a class="tab" href="/tracker">Tracker</a>
</nav>
<div class="wrap">
  <div class="head" id="head">Loading…</div>
  <div class="cols">
    <div>
      <div class="panel"><h2>Lines &amp; Totals (de-vig)</h2><div id="lines" class="scroll"><div class="empty">—</div></div></div>
      <div class="panel"><h2>Defense vs Position (per game allowed, ratio vs league)</h2><div id="dvp" class="scroll"><div class="empty">—</div></div></div>
    </div>
    <div>
      <div class="panel"><h2>Top Props (model)</h2><div id="props" class="scroll"><div class="empty">—</div></div></div>
    </div>
  </div>
</div>
<script>
const $=q=>document.querySelector(q);
const gid=location.pathname.split('/').pop();
const season=new URLSearchParams(location.search).get('season')||'';
const esc=x=>String(x??'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const am=p=>p==null?'—':(p>0?'+':'')+p;
async function init(){
  const d=await (await fetch(`/api/game/${gid}?season=${season}`)).json();
  if(d.error){$('#head').textContent=d.error;return}
  const g=d.game;
  const dt=new Date(g.date).toLocaleString([],{weekday:'long',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  $('#head').innerHTML=`<h1>${esc(g.away_name)} (${esc(d.away_summary?.record||g.away_record||'')}) @ ${esc(g.home_name)} (${esc(d.home_summary?.record||g.home_record||'')})</h1>
    <div class="muted">${g.completed?`FINAL: ${g.away_team} ${g.away_score} — ${g.home_team} ${g.home_score}`:dt} · ${esc(g.venue||'')} · Week ${g.week} · stats season ${d.stats_season}</div>`;
  renderLines(d,g); renderDvp(d,g); loadProps();
}
function renderLines(d,g){
  const L=d.lines;
  if(!L||!L.available){$('#lines').innerHTML='<div class="empty">Odds not configured / not posted yet.</div>';return}
  let h='<table><tr><th>Market</th><th>Best</th><th class="num">Price</th><th class="num">Fair%</th><th class="num">EV</th></tr>';
  const row=(label,b,fair)=>{
    if(!b)return'';
    return `<tr><td>${label}</td><td>${esc(b.book)}</td><td class="num">${am(b.price)}</td><td class="num">${fair!=null?(fair*100).toFixed(1)+'%':'—'}</td><td class="num ${b.ev>0?'pos':'neg'}">${b.ev!=null?(b.ev*100).toFixed(1)+'%':'—'}</td></tr>`;
  };
  h+=row(`${g.home_team} ML`,L.h2h.best_home,L.h2h.consensus_fair?.home);
  h+=row(`${g.away_team} ML`,L.h2h.best_away,L.h2h.consensus_fair?.away);
  if(L.spreads.point!=null){
    h+=row(`${g.home_team} ${L.spreads.point>0?'+':''}${L.spreads.point}`,L.spreads.best_home,L.spreads.consensus_fair?.home);
    h+=row(`${g.away_team} ${-L.spreads.point>0?'+':''}${-L.spreads.point}`,L.spreads.best_away,L.spreads.consensus_fair?.away);
  }
  if(L.totals.point!=null){
    h+=row(`Over ${L.totals.point}`,L.totals.best_over,L.totals.consensus_fair?.over);
    h+=row(`Under ${L.totals.point}`,L.totals.best_under,L.totals.consensus_fair?.under);
  }
  h+='</table>';
  const books=L.h2h.books||[];
  if(books.length){
    h+=`<div class="muted" style="margin-top:8px">${books.length} books quoted · consensus fair = median de-vig</div>`;
  }
  $('#lines').innerHTML=h;
}
function renderDvp(d,g){
  const t=(team,dvp)=>{
    if(!dvp)return'';
    let h=`<table><tr><th>${team} allows</th><th class="num">PassYd</th><th class="num">RushYd</th><th class="num">RecYd</th><th class="num">Rec</th></tr>`;
    const show={QB:['passing_yards','rushing_yards'],RB:['rushing_yards','receiving_yards','receptions'],WR:['receiving_yards','receptions'],TE:['receiving_yards','receptions']};
    for(const pos of ['QB','RB','WR','TE']){
      const c=dvp[pos];if(!c)continue;
      const cell=s=>show[pos].includes(s)?`<td class="num">${c[s]??'—'} <span class="muted">${c[s+'_ratio']!=null?'('+c[s+'_ratio'].toFixed(2)+')':''}</span></td>`:'<td class="num muted">—</td>';
      h+=`<tr><td>vs ${pos}</td>${cell('passing_yards')}${cell('rushing_yards')}${cell('receiving_yards')}${cell('receptions')}</tr>`;
    }
    return h+'</table>';
  };
  $('#dvp').innerHTML=t(g.home_team,d.home_dvp)+'<div style="height:10px"></div>'+t(g.away_team,d.away_dvp);
}
async function loadProps(){
  const d=await (await fetch(`/api/props/game/${gid}?season=${season}`)).json();
  const rows=(d.rows||[]).slice(0,30);
  if(!rows.length){$('#props').innerHTML='<div class="empty">No projectable players.</div>';return}
  let h='<table><tr><th>Player</th><th>Mkt</th><th class="num">Line</th><th class="num">Proj</th><th class="num">P(over)</th><th class="num">Edge</th></tr>';
  for(const r of rows){
    h+=`<tr><td>${esc(r.player)} <span class="muted">${r.team} ${r.position}</span></td><td>${esc(r.marketLabel)}</td><td class="num">${r.line}</td><td class="num">${r.modelMean}</td><td class="num">${(r.probOver*100).toFixed(0)}%</td><td class="num ${r.edge>0?'pos':r.edge<0?'neg':''}">${r.edge!=null?(r.edge*100).toFixed(1)+'%':'<span class="muted">no odds</span>'}</td></tr>`;
  }
  $('#props').innerHTML=h+'</table>';
}
init();
</script>
</body>
</html>
