<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Game · NFL Analytics Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/static/theme.css">
<script src="/static/app.js" defer></script>
<style>
.ghead{padding:18px;margin-bottom:14px}
.matchup{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mteam{flex:1;min-width:0}
.mteam.home{text-align:right}
.mteam .nm{font-weight:800;font-size:16px}
.mteam .rec{color:var(--mu);font-size:12px}
.mscore{font-family:var(--disp);font-weight:900;font-size:34px;font-variant-numeric:tabular-nums;display:flex;gap:14px;align-items:baseline}
.mscore .win{color:var(--g)}
.mscore .at{color:var(--mu2);font-size:15px}
.gmeta{color:var(--mu);font-size:12px;margin-top:9px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:920px){.cols{grid-template-columns:1fr}}
.addbtn{background:var(--volt-dim);border:1px solid var(--b-strong);color:var(--volt);border-radius:8px;font-weight:800;font-size:11px;padding:4px 9px}
.addbtn.in{background:var(--card3);border-color:var(--line);color:var(--mu)}
.pname{font-weight:700}.pname:hover{color:var(--volt)}
</style>
</head>
<body>
<main class="wrap">
  <div class="card ghead" id="head"><div class="skel" style="height:70px"></div></div>
  <div class="cols">
    <div>
      <div class="panel"><h2>Lines &amp; Totals · de-vig</h2><div class="scroll" id="lines"><div class="empty">…</div></div></div>
      <div class="panel"><h2>Defense vs Position</h2><div class="scroll pad" id="dvp"></div></div>
    </div>
    <div>
      <div class="panel"><h2>Props · model board</h2><div class="scroll" id="props"><div class="empty">…</div></div></div>
    </div>
  </div>
</main>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const { $, esc, am, fetchJSON, shell, addToSlip } = NFLHub;
  shell('');
  const gid = location.pathname.split('/').pop();
  const season = new URLSearchParams(location.search).get('season') || '';
  let G = null, propRows = [];

  let d;
  try { d = await fetchJSON(`/api/game/${gid}?season=${season}`); }
  catch (e) { $('#head').innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
  G = d.game;
  renderHead(d); renderLines(d); renderDvp(d); loadProps();

  function renderHead(d) {
    const g = G, live = g.state === 'in', done = g.completed;
    const dt = new Date(g.date).toLocaleString([], { weekday:'long', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    const state = live ? `<span class="tag live"><span class="livedot"></span> ${esc(g.status_detail||'LIVE')}</span>`
      : done ? '<span class="tag final">Final</span>' : `<span class="tag pre">${dt}</span>`;
    const score = (done || live)
      ? `<div class="mscore"><span class="${done&&g.away_score>g.home_score?'win':''}">${g.away_score??0}</span><span class="at">—</span><span class="${done&&g.home_score>g.away_score?'win':''}">${g.home_score??0}</span></div>`
      : '<div class="mscore"><span class="at">@</span></div>';
    $('#head').innerHTML = `
      <div class="matchup">
        <div class="mteam"><div class="nm">${esc(g.away_name)}</div><div class="rec">${esc(d.away_summary?.record||g.away_record||'')} · ${d.away_summary?`${d.away_summary.ppg} PF/g`:''}</div></div>
        ${score}
        <div class="mteam home"><div class="nm">${esc(g.home_name)}</div><div class="rec">${esc(d.home_summary?.record||g.home_record||'')} · ${d.home_summary?`${d.home_summary.ppg} PF/g`:''}</div></div>
      </div>
      <div class="gmeta">${state}<span>${esc(g.venue||'')}</span><span>Week ${g.week}</span><span>stats ${d.stats_season}</span></div>`;
  }

  function renderLines(d) {
    const L = d.lines;
    if (!L || !L.available) { $('#lines').innerHTML = '<div class="empty">No lines posted (or odds not configured).</div>'; return; }
    const rows = [];
    const push = (label, mk, side, line, b, fair) => b && rows.push({ label, mk, side, line, b, fair });
    push(`${G.home_team} ML`, 'h2h', 'home', null, L.h2h.best_home, L.h2h.consensus_fair?.home);
    push(`${G.away_team} ML`, 'h2h', 'away', null, L.h2h.best_away, L.h2h.consensus_fair?.away);
    if (L.spreads.point != null) {
      push(`${G.home_team} ${L.spreads.point>0?'+':''}${L.spreads.point}`, 'spread', 'home', L.spreads.point, L.spreads.best_home, L.spreads.consensus_fair?.home);
      push(`${G.away_team} ${-L.spreads.point>0?'+':''}${-L.spreads.point}`, 'spread', 'away', -L.spreads.point, L.spreads.best_away, L.spreads.consensus_fair?.away);
    }
    if (L.totals.point != null) {
      push(`Over ${L.totals.point}`, 'total', 'over', L.totals.point, L.totals.best_over, L.totals.consensus_fair?.over);
      push(`Under ${L.totals.point}`, 'total', 'under', L.totals.point, L.totals.best_under, L.totals.consensus_fair?.under);
    }
    let h = '<table><thead><tr><th>Market</th><th>Best book</th><th class="num">Price</th><th class="num">Fair</th><th class="num">EV</th><th></th></tr></thead><tbody>';
    rows.forEach((r, i) => {
      h += `<tr><td>${esc(r.label)}</td><td class="muted">${esc(r.b.book)}</td>
        <td class="num">${am(r.b.price)}</td>
        <td class="num">${r.fair!=null?(r.fair*100).toFixed(1)+'%':'—'}</td>
        <td class="num ${r.b.ev>0?'pos':'neg'}">${r.b.ev!=null?(r.b.ev*100).toFixed(1)+'%':'—'}</td>
        <td><button class="addbtn" data-i="${i}">+ Slip</button></td></tr>`;
    });
    $('#lines').innerHTML = h + '</tbody></table>';
    $('#lines').querySelectorAll('.addbtn').forEach(b => b.onclick = () => {
      const r = rows[+b.dataset.i];
      addToSlip({
        gameId: G.game_id, season: G.season, week: G.week, gameday: (G.date||'').slice(0,10),
        player: r.label, marketKey: r.mk, marketLabel: r.label, line: r.line,
        side: r.side, price: r.b.price, book: r.b.book,
        modelProb: r.fair, impliedProb: r.b.price != null ? null : null,
        edge: r.b.edge, evPct: r.b.ev, modelSource: 'market',
      });
      b.textContent = '✓'; b.classList.add('in');
    });
  }

  function renderDvp(d) {
    const show = { QB:['passing_yards','rushing_yards'], RB:['rushing_yards','receiving_yards','receptions'], WR:['receiving_yards','receptions'], TE:['receiving_yards','receptions'] };
    const t = (team, dvp) => {
      if (!dvp) return '';
      let h = `<table><thead><tr><th>${team} allows</th><th class="num">PassYd</th><th class="num">RushYd</th><th class="num">RecYd</th><th class="num">Rec</th></tr></thead><tbody>`;
      for (const pos of ['QB','RB','WR','TE']) {
        const c = dvp[pos]; if (!c) continue;
        const cell = s => show[pos].includes(s)
          ? `<td class="num">${c[s]??'—'} <span class="muted">${c[s+'_ratio']!=null?'('+c[s+'_ratio'].toFixed(2)+')':''}</span></td>`
          : '<td class="num" style="color:var(--mu2)">—</td>';
        h += `<tr><td>vs ${pos}</td>${cell('passing_yards')}${cell('rushing_yards')}${cell('receiving_yards')}${cell('receptions')}</tr>`;
      }
      return h + '</tbody></table>';
    };
    $('#dvp').innerHTML = t(G.home_team, d.home_dvp) + '<div style="height:12px"></div>' + t(G.away_team, d.away_dvp) +
      '<div class="muted" style="margin-top:8px">per-game allowed · (ratio vs league avg, &gt;1 = favorable matchup)</div>';
  }

  async function loadProps() {
    let pd;
    try { pd = await fetchJSON(`/api/props/game/${gid}?season=${season}`); }
    catch (e) { $('#props').innerHTML = `<div class="empty">${esc(e.message)}</div>`; return; }
    propRows = pd.rows || [];
    if (!propRows.length) { $('#props').innerHTML = '<div class="empty">No projectable players.</div>'; return; }
    let h = '<table><thead><tr><th>Player</th><th>Market</th><th class="num">Line</th><th class="num">Proj</th><th class="num">P(O)</th><th class="num">Edge</th><th></th></tr></thead><tbody>';
    propRows.slice(0, 40).forEach((r, i) => {
      h += `<tr>
        <td><a class="pname" href="/player/${esc(r.playerId)}?season=${r.season}">${esc(r.player)}</a> <span class="muted">${r.team} ${r.position}</span></td>
        <td>${esc(r.marketLabel)}</td>
        <td class="num">${r.line}${r.noOdds?'<span class="muted">*</span>':''}</td>
        <td class="num">${r.modelMean}</td>
        <td class="num">${(r.probOver*100).toFixed(0)}%</td>
        <td class="num ${r.edge>0?'pos':r.edge<0?'neg':''}">${r.edge!=null?(r.edge*100).toFixed(1)+'%':'—'}</td>
        <td><button class="addbtn" data-i="${i}">+</button></td></tr>`;
    });
    $('#props').innerHTML = h + '</tbody></table>';
    $('#props').querySelectorAll('.addbtn').forEach(b => b.onclick = () => {
      const r = propRows[+b.dataset.i];
      const best = r.side === 'over' ? r.bestOver : r.bestUnder;
      addToSlip({
        gameId: r.gameId, season: r.season, week: r.week, gameday: r.gameday,
        player: r.player, playerId: r.playerId, team: r.team, opponent: r.opponent,
        position: r.position, marketKey: r.marketKey, marketLabel: r.marketLabel,
        line: r.line, side: r.side, price: best?best.price:null, book: best?best.book:null,
        modelProb: r.modelProb, impliedProb: r.impliedProb, fairProb: r.fairProb,
        edge: r.edge, evPct: r.evPct, kellyPct: r.kellyPct, modelSource: r.modelSource,
      });
      b.textContent = '✓'; b.classList.add('in');
    });
  }
});
</script>
</body>
</html>
