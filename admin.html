<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Data Operations · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"></head>
<body><main class="page"><div class="page-head"><div><span class="eyebrow">Platform operations</span><h1>Data Control Center</h1><p>Freshness, warehouse inventory, scheduled jobs, model registry, and data quality.</p></div><button class="btn primary" id="refresh">Refresh</button></div><section class="kpi-grid" id="kpis"></section><section class="grid-2"><div class="panel"><div class="panel-head"><h2>Data sources</h2></div><div id="sources"></div></div><div class="panel"><div class="panel-head"><h2>Scheduled jobs</h2></div><div id="jobs"></div></div></section><section class="panel"><div class="panel-head"><h2>Integration readiness</h2><button class="btn small" id="run-integrations">Run configured</button></div><div id="integrations"></div></section></main><script src="/static/app.js"></script><script>
(async()=>{NFLHub.shell('admin'); const {$,fetchJSON:api}=NFLHub; async function load(){const d=await api('/api/admin/overview'); const i=d.inventory; $('#kpis').innerHTML=Object.entries(i).map(([k,v])=>`<article class="kpi-card"><span>${k.replaceAll('_',' ')}</span><strong>${Number(v).toLocaleString()}</strong></article>`).join(''); $('#sources').innerHTML=(d.sources||[]).map(x=>`<div class="list-row"><div><strong>${x.key}</strong><small>${x.last_success_at||'Never synced'}</small></div><span class="badge ${x.enabled?'good':'muted'}">${x.enabled?'Enabled':'Disabled'}</span></div>`).join('')||'<div class="empty">No sources registered.</div>'; $('#jobs').innerHTML=(d.jobs||[]).map(x=>`<div class="list-row"><div><strong>${x.name}</strong><small>${x.cron} · ${x.last_status||'Never run'}</small></div><button class="btn small" data-job="${x.key}">Run</button></div>`).join('')||'<div class="empty">No jobs registered.</div>'; document.querySelectorAll('[data-job]').forEach(b=>b.onclick=async()=>{await api(`/api/admin/jobs/${b.dataset.job}/run`,{method:'POST'});load()})} const ints=await api('/api/admin/integrations'); $('#integrations').innerHTML=(ints.providers||[]).map(x=>`<div class="list-row"><div><strong>${x.label}</strong><small>${x.datasets.join(', ')}</small></div><span class="badge ${x.configured?'good':'muted'}">${x.configured?'Ready':'Needs config'}</span></div>`).join(''); $('#run-integrations').onclick=async()=>{const season=new Date().getFullYear(); await api('/api/admin/integrations/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({season,datasets:['live_games','weather','odds','injuries']})}); load()}; $('#refresh').onclick=load; load()})()
</script></body></html>
