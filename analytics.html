<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Analytics · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"><script src="/static/app.js" defer></script></head><body><main class="wrap"><section class="ai-page"><header class="ai-pagehead"><div><h1>Analytics</h1><p>Team efficiency, projection signals, and transparent model diagnostics.</p></div><div class="ai-controls" id="controls"></div></header><div id="kpis" class="directory-kpis"></div><div class="analytics-layout"><section class="ai-card ai-cardpad"><h3>Team efficiency matrix</h3><div class="directory-table-wrap"><table class="ai-data directory-table"><thead><tr><th>Rank</th><th>Team</th><th>Record</th><th>Power</th><th>PPG</th><th>PA/G</th><th>Diff</th><th>Next</th></tr></thead><tbody id="team-body"></tbody></table></div></section><section class="ai-card ai-cardpad"><h3>Strongest projection signals</h3><div id="signals"></div></section><section class="ai-card ai-cardpad analytics-method"><h3>Methodology</h3><p id="method"></p></section></div></section></main><script>
document.addEventListener('DOMContentLoaded',async()=>{const{$,esc,fetchJSON,shell,weekControls,pc}=NFLHub;shell('analytics');await weekControls($('#controls'),load);async function load(w){try{const d=await fetchJSON(`/api/analytics?season=${w.season}`);$('#kpis').innerHTML=[['Teams',d.kpis.teams],['Player pool',d.kpis.player_pool],['Avg points',d.kpis.avg_points],['Projection signals',d.kpis.projection_signals]].map(x=>`<div class="ai-card directory-kpi"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');$('#team-body').innerHTML=d.team_efficiency.map((t,i)=>`<tr><td>#${i+1}</td><td><span class="team-pill">${t.team}</span></td><td>${t.record}</td><td class="purple">${t.power_score}</td><td>${t.ppg}</td><td>${t.papg}</td><td class="${t.point_diff>=0?'positive':'negative'}">${t.point_diff>0?'+':''}${t.point_diff}</td><td>${t.next_opponent||'—'}</td></tr>`).join('');$('#signals').innerHTML=d.top_signals.map(s=>`<a class="signal-row" href="/player/${s.playerId}"><span><b>${esc(s.player)}</b><small>${s.team} · ${s.position} · vs ${s.opponent||'TBD'}</small></span><span>${esc(s.marketLabel)}<small>Proj ${s.projection} · Line ${s.line}</small></span><strong class="cyan">${pc(s.probOver)}</strong></a>`).join('')||'<div class="ai-empty">No signals available.</div>';$('#method').textContent=d.methodology}catch(e){$('#method').textContent=e.message}}});
</script></body></html>
