name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nfl_test
          POSTGRES_USER: nfl
          POSTGRES_PASSWORD: nfl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nfl -d nfl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      SECRET_KEY: ci-only-secret
      DATABASE_URL: postgresql+psycopg://nfl:nfl@localhost:5432/nfl_test
      REDIS_URL: redis://localhost:6379/0
      ENABLE_SCHEDULER: "false"
      ENABLE_EXTERNAL_SYNC: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m compileall -q .
      - run: flask --app app db upgrade
      - run: pytest -q
      - run: docker build -t nfl-analytics-hub:ci .
