name: Quality and Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint production v3.2 surfaces
        run: >-
          ruff check
          database.py
          realtime_v32.py
          routes/v32_api.py
          routes/v32_release_api.py
          v32_release.py
      - name: Check production v3.2 formatting
        run: >-
          ruff format --check
          database.py
          realtime_v32.py
          routes/v32_api.py
          routes/v32_release_api.py
          v32_release.py
      - run: mypy analytics_engine routes/analytics_api.py
      - run: bandit -q -r . -x tests,migrations,.venv
      - run: pip-audit -r requirements.txt

  analytics-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest pytest-cov
      - name: Run complete analytics coverage suite
        run: >-
          pytest -q
          tests/test_analytics_engine.py
          tests/test_game_intelligence_v31.py
          tests/test_v31_platform.py
          tests/test_v31_coverage.py
          --cov=analytics_engine
          --cov-fail-under=85
