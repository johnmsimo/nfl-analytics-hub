<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Teams · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"><script src="/static/app.js" defer></script></head><body><main class="wrap"><section class="ai-page"><header class="ai-pagehead"><div><h1>Teams</h1><p>Power ratings, scoring efficiency, defense index, and upcoming opponents.</p></div><div class="ai-controls" id="controls"></div></header><div id="teams-grid" class="team-directory-grid"><div class="ai-card ai-empty">Loading teams…</div></div></section></main><script>
document.addEventListener('DOMContentLoaded',async()=>{const{$,esc,fetchJSON,shell,weekControls,headshot,teamLogo}=NFLHub;shell('teams');await weekControls($('#controls'),load);async function load(w){try{const d=await fetchJSON(`/api/teams?season=${w.season}`);$('#teams-grid').innerHTML=d.teams.length?d.teams.map(t=>`<article class="ai-card team-directory-card"><div class="team-directory-top"><span class="team-rank">#${t.rank}</span><span class="team-badge-lg" title="${t.team}">${teamLogo(t.team,'tlogo-md')}</span><div><b>${t.record}</b><small>${t.games} games</small></div><strong>${t.power_score}</strong></div><div class="team-metric-grid"><span><small>PPG</small><b>${t.ppg}</b></span><span><small>PA/G</small><b>${t.papg}</b></span><span><small>Diff</small><b class="${t.point_diff>=0?'positive':'negative'}">${t.point_diff>0?'+':''}${t.point_diff}</b></span><span><small>Defense</small><b>${t.defense_index}</b></span></div><div class="team-directory-next">${t.next_opponent?`Next: <a href="/game/${t.next_game_id}">${t.next_opponent}</a> · ${new Date(t.next_game_date).toLocaleDateString()}`:'No upcoming game'}</div></article>`).join(''):'<div class="ai-card ai-empty">No team data available.</div>'}catch(e){$('#teams-grid').innerHTML=`<div class="ai-card ai-empty">${esc(e.message)}</div>`}}});
</script></body></html>
