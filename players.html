<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Players · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"><script src="/static/app.js" defer></script></head><body><main class="wrap"><section class="ai-page"><header class="ai-pagehead"><div><h1>Players</h1><p>Searchable player directory with production and recent opportunity metrics.</p></div><div class="ai-controls" id="controls"></div></header><div class="directory-toolbar"><input id="q" placeholder="Search player or team"><select id="position"><option value="ALL">All positions</option></select><select id="team"><option value="ALL">All teams</option></select></div><article class="ai-card"><div class="directory-table-wrap"><table class="ai-data directory-table"><thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Games</th><th>Pass Y/G</th><th>Rush Y/G</th><th>Rec Y/G</th><th>Rec/G</th><th>TD</th><th>Recent usage</th></tr></thead><tbody id="rows"><tr><td colspan="10" class="ai-empty">Loading players…</td></tr></tbody></table></div></article><p class="directory-count" id="count"></p></section></main><script>
document.addEventListener('DOMContentLoaded',async()=>{const{$,esc,fetchJSON,shell,weekControls}=NFLHub;shell('players');let current;await weekControls($('#controls'),w=>{current=w;load()});let timer;for(const id of ['q','position','team']){$('#'+id).addEventListener(id==='q'?'input':'change',()=>{clearTimeout(timer);timer=setTimeout(load,180)})}async function load(){if(!current)return;const u=new URLSearchParams({season:current.season,q:$('#q').value,position:$('#position').value,team:$('#team').value,limit:300});try{const d=await fetchJSON('/api/players?'+u);if($('#position').options.length===1)$('#position').innerHTML='<option value="ALL">All positions</option>'+d.positions.map(x=>`<option>${x}</option>`).join('');if($('#team').options.length===1)$('#team').innerHTML='<option value="ALL">All teams</option>'+d.teams.map(x=>`<option>${x}</option>`).join('');$('#rows').innerHTML=d.players.length?d.players.map(p=>`<tr><td><a href="/player/${p.playerId}"><b>${esc(p.name)}</b></a></td><td>${p.position}</td><td><span class="team-pill">${p.team}</span></td><td>${p.games}</td><td>${p.pass_yds_pg}</td><td>${p.rush_yds_pg}</td><td>${p.rec_yds_pg}</td><td>${p.receptions_pg}</td><td>${p.tds}</td><td class="cyan">${p.recent_usage}</td></tr>`).join(''):'<tr><td colspan="10" class="ai-empty">No matching players.</td></tr>';$('#count').textContent=`${d.total} players · stats season ${d.stats_season}`}catch(e){$('#rows').innerHTML=`<tr><td colspan="10" class="ai-empty">${esc(e.message)}</td></tr>`}}});
</script></body></html>
