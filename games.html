<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Games · NFL Analytics Hub</title><link rel="stylesheet" href="/static/theme.css"><script src="/static/app.js" defer></script></head><body><main class="wrap"><section class="ai-page"><header class="ai-pagehead"><div><h1>Games</h1><p>Weekly slate, matchup context, projected scores, and market availability.</p></div><div class="ai-controls" id="controls"></div></header><div id="summary" class="directory-kpis"></div><div id="games-grid" class="directory-card-grid"><div class="ai-card ai-empty">Loading games…</div></div></section></main><script>
document.addEventListener('DOMContentLoaded',async()=>{const{$,esc,pc,fetchJSON,shell,weekControls,headshot,teamLogo}=NFLHub;shell('games');await weekControls($('#controls'),load);async function load(w){$('#games-grid').innerHTML='<div class="ai-card ai-empty">Loading weekly slate…</div>';try{const d=await fetchJSON(`/api/games/week?season=${w.season}&week=${w.week}&type=${w.type}`);render(d)}catch(e){$('#games-grid').innerHTML=`<div class="ai-card ai-empty">${esc(e.message)}</div>`}}function render(d){const games=d.games||[];const completed=games.filter(g=>g.completed).length;const live=games.filter(g=>g.status&&g.status!=='STATUS_SCHEDULED'&&!g.completed).length;$('#summary').innerHTML=[['Games',games.length],['Completed',completed],['Live',live],['Odds available',games.filter(g=>g.lines?.available).length]].map(x=>`<div class="ai-card directory-kpi"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');$('#games-grid').innerHTML=games.length?games.map(g=>`<a class="ai-card game-directory-card" href="/game/${g.game_id}"><div class="game-directory-date">${new Date(g.date).toLocaleString([],{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div><div class="game-directory-matchup"><span><b>${g.away_team}</b><small>${g.away_summary?.record||'—'} · ${g.away_summary?.ppg||'—'} PPG</small></span><strong>${g.away_score??'@'}</strong></div><div class="game-directory-matchup"><span><b>${g.home_team}</b><small>${g.home_summary?.record||'—'} · ${g.home_summary?.ppg||'—'} PPG</small></span><strong>${g.home_score??''}</strong></div><div class="game-directory-foot"><span>${esc(g.status_detail||g.status||'Scheduled')}</span><span class="${g.lines?.available?'positive':'muted'}">${g.lines?.available?'Markets live':'No odds'}</span></div></a>`).join(''):'<div class="ai-card ai-empty">No games found for this week.</div>'} });
</script></body></html>
